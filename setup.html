<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VRMS - Define Bays</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Brand Colors & Typography from Index */
        :root {
            --brand-gradient: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --brand-solid: #0072ff;
            --dark-slate: #2c3e50;
            --light-bg: #f4f7f6;
        }

        body { 
            background-color: var(--light-bg); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #2c3e50;
        }

        /* Consistently Styled Buttons */
        .btn-brand { 
            background: var(--brand-gradient); 
            border: none; 
            color: white; 
            transition: opacity 0.2s;
        }
        .btn-brand:hover { color: white; opacity: 0.9; }
        
        .btn-outline-brand {
            border: 2px solid var(--brand-solid);
            color: var(--brand-solid);
            background: transparent;
        }
        .btn-outline-brand:hover {
            background: var(--brand-solid);
            color: white;
        }

        .badge-brand { 
            background: var(--brand-solid); 
            color: white; 
        }

        /* Canvas & Stream Container */
        .canvas-container { 
            position: relative; 
            width: 100%; 
            max-width: 1200px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.175);
            aspect-ratio: 16/9; 
            background: #000;
            overflow: hidden;
        }
        .stream-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1; 
        }
        canvas { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            cursor: crosshair; 
            background: transparent; 
            z-index: 2; 
        }

        /* Bay Items & Cards */
        .sidebar-card {
            background: #ffffff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 .125rem .25rem rgba(0,0,0,.075);
        }

        .bay-item { 
            background: #ffffff; 
            border: none;
            border-left: 5px solid #bdc3c7; 
            border-radius: 8px; 
            box-shadow: 0 .125rem .25rem rgba(0,0,0,.075);
            transition: transform 0.2s;
        }
        .bay-item:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="p-4">

<div class="container-fluid">
    <a href="index.html" class="btn btn-outline-secondary mb-3 shadow-sm"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <div class="row">
        <div class="col-md-9">
            <h4 class="fw-bold"><span class="badge badge-brand me-2">Step 1</span> Draw Parking Bays</h4>
            <p class="text-muted">Click and drag to define a bay. The coordinates are automatically scaled to 1080p native resolution.</p>
            
            <div class="d-flex align-items-center mb-3 mt-4">
                <select id="cameraSelect" class="form-select me-2 shadow-sm" onchange="changeCamera()" style="max-width: 300px;">
                    <option value="">Select a Camera</option>
                </select>
                <button class="btn btn-outline-brand text-nowrap me-2 shadow-sm" onclick="addNewCamera()"><i class="fas fa-plus me-1"></i> Add Camera</button>
                <button class="btn btn-outline-danger text-nowrap shadow-sm" id="btnDeleteCamera" onclick="deleteCamera()" style="display: none;"><i class="fas fa-trash"></i> Delete Camera</button>
            </div>
            
            <div class="canvas-container mt-2">
                <img id="videoStream" src="" class="stream-bg" alt="Select a camera to view stream">
                <canvas id="drawCanvas" width="1920" height="1080"></canvas>
            </div>
        </div>

        <div class="col-md-3">
            <h4 class="fw-bold"><span class="badge badge-brand me-2">Step 2</span> Save & Manage</h4>
            
            <div class="card sidebar-card mt-3">
                <div class="card-body p-4">
                    <label class="fw-bold text-muted small text-uppercase mb-1">Bay Name:</label>
                    <input type="text" id="bayName" class="form-control mb-3" placeholder="e.g. Bay A-1">
                    
                    <label class="fw-bold text-muted small text-uppercase mb-1">Coordinates (1080p):</label>
                    <div class="row g-2 mb-4 text-muted bg-light p-2 rounded" style="font-size: 0.9em;">
                        <div class="col-6">X1: <span id="lbl-x1" class="fw-bold text-dark">0</span></div>
                        <div class="col-6">Y1: <span id="lbl-y1" class="fw-bold text-dark">0</span></div>
                        <div class="col-6">X2: <span id="lbl-x2" class="fw-bold text-dark">0</span></div>
                        <div class="col-6">Y2: <span id="lbl-y2" class="fw-bold text-dark">0</span></div>
                    </div>
                    
                    <button class="btn btn-brand w-100 shadow-sm" onclick="saveBay()"><i class="fas fa-save me-1"></i> Save Bay</button>
                    <button class="btn btn-light border w-100 mt-2" onclick="clearCurrentDrawing()">Clear Drawing</button>
                </div>
            </div>

            <h5 class="mt-4 border-bottom pb-2 fw-bold text-muted">Existing Bays</h5>
            <div id="existing-bays" class="mt-3">
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL_BAYS = 'http://127.0.0.1:8000/api/bays';
    const API_URL_CAMERAS = 'http://127.0.0.1:8000/api/cameras';
    
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    
    let isDrawing = false;
    let startX = 0, startY = 0;
    let currentX = 0, currentY = 0;
    
    let savedBays = []; 
    let currentCameraId = null;
    let currentStreamIndex = null;

    async function init() {
        await loadCameras();
        await loadBays();
    }

    async function loadCameras() {
        try {
            const response = await fetch(API_URL_CAMERAS);
            const data = await response.json();
            const select = document.getElementById('cameraSelect');
            
            select.innerHTML = '<option value="">Select a Camera</option>';
            
            const cameraList = data.cameras || data;
            
            if (Array.isArray(cameraList)) {
                cameraList.forEach(cam => {
                    const option = document.createElement('option');
                    option.value = cam.id;
                    option.setAttribute('data-stream', cam.stream_index);
                    option.textContent = cam.camera_name;
                    select.appendChild(option);
                });
            }
        } catch (e) { 
            console.error("Could not load cameras", e); 
        }
    }

    async function addNewCamera() {
        const name = prompt("Enter Camera Name (e.g., Gate 1):");
        const stream = prompt("Enter Camera Index (e.g., 0, 1, file path, or RTSP URL):");
        if (name && stream) {
            try {
                await fetch(API_URL_CAMERAS, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ camera_name: name, stream_index: stream })
                });
                loadCameras();
            } catch (e) { alert("Failed to add camera"); }
        }
    }

    async function deleteCamera() {
        if (!currentCameraId) return;
        if (!confirm("Are you sure? This will delete the camera and ALL its parked bays!")) return;
        
        try {
            await fetch(`${API_URL_CAMERAS}/${currentCameraId}`, { method: 'DELETE' });
            currentCameraId = null;
            document.getElementById('videoStream').src = "";
            document.getElementById('btnDeleteCamera').style.display = 'none';
            document.getElementById('cameraSelect').value = "";
            
            await loadCameras(); 
            await loadBays();    
            redrawCanvas();
        } catch (e) { alert("Failed to delete camera."); }
    }

    function changeCamera() {
        const select = document.getElementById('cameraSelect');
        const btnDelete = document.getElementById('btnDeleteCamera'); 
        
        if (!select.value) {
            currentCameraId = null;
            currentStreamIndex = null;
            document.getElementById('videoStream').src = "";
            btnDelete.style.display = 'none'; 
            renderBayList();
            redrawCanvas();
            return;
        }
        
        currentCameraId = parseInt(select.value);
        currentStreamIndex = select.options[select.selectedIndex].getAttribute('data-stream');
        btnDelete.style.display = 'block'; 
        
        document.getElementById('videoStream').src = `http://127.0.0.1:8000/api/video_feed/${currentStreamIndex}`;
        
        renderBayList();
        redrawCanvas();
    }

    async function loadBays() {
        try {
            const response = await fetch(API_URL_BAYS);
            const data = await response.json();
            savedBays = data.bays || data;
            renderBayList();
            redrawCanvas();
        } catch (e) { console.error("Could not load bays", e); }
    }

    function renderBayList() {
        const list = document.getElementById('existing-bays');
        list.innerHTML = '';
        
        if (!currentCameraId) {
            list.innerHTML = '<div class="text-muted small">Select a camera to see bays.</div>';
            return;
        }

        const filteredBays = savedBays.filter(b => b.camera_id === currentCameraId);
        
        filteredBays.forEach(bay => {
            const div = document.createElement('div');
            div.className = 'bay-item p-3 mb-3 d-flex justify-content-between align-items-center';
            div.innerHTML = `
                <div>
                    <strong class="text-dark">${bay.bay_name}</strong><br>
                    <small class="text-muted">(${bay.x_min}, ${bay.y_min}) to (${bay.x_max}, ${bay.y_max})</small>
                </div>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteBay(${bay.id})"><i class="fas fa-trash"></i></button>
            `;
            list.appendChild(div);
        });
    }

    function getScaledMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: Math.round((evt.clientX - rect.left) * scaleX),
            y: Math.round((evt.clientY - rect.top) * scaleY)
        };
    }

    canvas.addEventListener('mousedown', (e) => {
        if (!currentCameraId) return alert("Please select a camera first!");
        const pos = getScaledMousePos(e);
        startX = pos.x;
        startY = pos.y;
        isDrawing = true;
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const pos = getScaledMousePos(e);
        currentX = pos.x;
        currentY = pos.y;
        
        document.getElementById('lbl-x1').innerText = startX;
        document.getElementById('lbl-y1').innerText = startY;
        document.getElementById('lbl-x2').innerText = currentX;
        document.getElementById('lbl-y2').innerText = currentY;

        redrawCanvas();
        
        ctx.strokeStyle = '#0072ff';
        ctx.lineWidth = 4;
        ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
    });

    canvas.addEventListener('mouseup', () => { isDrawing = false; });

    function clearCurrentDrawing() {
        startX = 0; startY = 0; currentX = 0; currentY = 0;
        document.getElementById('lbl-x1').innerText = 0;
        document.getElementById('lbl-y1').innerText = 0;
        document.getElementById('lbl-x2').innerText = 0;
        document.getElementById('lbl-y2').innerText = 0;
        redrawCanvas();
    }

    function redrawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (!currentCameraId) return;

        const filteredBays = savedBays.filter(b => b.camera_id === currentCameraId);
        
        filteredBays.forEach(bay => {
            ctx.strokeStyle = '#2ecc71'; 
            ctx.lineWidth = 4;
            const w = bay.x_max - bay.x_min;
            const h = bay.y_max - bay.y_min;
            ctx.strokeRect(bay.x_min, bay.y_min, w, h);
            
            ctx.fillStyle = '#2ecc71';
            ctx.font = '30px Arial';
            ctx.fillText(bay.bay_name, bay.x_min + 10, bay.y_min + 35);
        });
    }

    async function saveBay() {
        if (!currentCameraId) return alert("Select a camera before saving!");
        
        const name = document.getElementById('bayName').value;
        if (!name || startX === currentX) return alert("Enter a name and draw a box!");

        const payload = {
            camera_id: currentCameraId,
            bay_name: name,
            x_min: Math.min(startX, currentX),
            y_min: Math.min(startY, currentY),
            x_max: Math.max(startX, currentX),
            y_max: Math.max(startY, currentY)
        };

        try {
            await fetch(API_URL_BAYS, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            document.getElementById('bayName').value = '';
            clearCurrentDrawing();
            loadBays(); 
        } catch (e) { alert("Failed to save bay"); }
    }

    async function deleteBay(id) {
        if (!confirm("Delete this bay?")) return;
        try {
            await fetch(`${API_URL_BAYS}/${id}`, { method: 'DELETE' });
            loadBays();
        } catch (e) { alert("Failed to delete"); }
    }

    init();
</script>
</body>
</html>
