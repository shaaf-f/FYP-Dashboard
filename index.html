<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; padding-top: 20px; }
        .camera-container { background: #000; border-radius: 8px; position: relative; overflow: hidden; aspect-ratio: 16/9; }
        .bay-card { transition: transform 0.2s; cursor: pointer; border-left: 5px solid #bdc3c7; }
        .bay-card.occupied { border-left-color: #e74c3c; }
        .bay-card.vacant { border-left-color: #2ecc71; }
        .status-badge { font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar shadow">
            <h4 class="text-center mb-4">Parking Bays</h4>
            <div id="bay-list" class="px-2">
                <div class="card mb-2 bay-card occupied shadow-sm">
                    <div class="card-body p-2">
                        <div class="d-flex justify-content-between">
                            <h6 class="mb-0">Bay A-101</h6>
                            <span class="badge bg-danger status-badge">Occupied</span>
                        </div>
                        <small class="text-muted">BFF-029 | SUZUKI CULTUS</small>
                    </div>
                </div>

                <div class="card mb-2 bay-card vacant shadow-sm">
                    <div class="card-body p-2">
                        <div class="d-flex justify-content-between">
                            <h6 class="mb-0">Bay A-102</h6>
                            <span class="badge bg-success status-badge">Vacant</span>
                        </div>
                        <small class="text-muted">No vehicle detected</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-9 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Facility Overview</h2>
                <div class="btn-group">
                    <button class="btn btn-outline-primary active">Camera 01</button>
                    <button class="btn btn-outline-primary">Camera 02</button>
                    <button class="btn btn-primary ms-3"><i class="fas fa-plus"></i> Define Bay</button>
                </div>
            </div>

            <div class="row mb-4 text-center">
                <div class="col-md-4"><div class="card p-3 shadow-sm"><h5>Total Bays</h5><h3>12</h3></div></div>
                <div class="col-md-4"><div class="card p-3 shadow-sm text-danger"><h5>Occupied</h5><h3>5</h3></div></div>
                <div class="col-md-4"><div class="card p-3 shadow-sm text-success"><h5>Available</h5><h3>7</h3></div></div>
            </div>

            <div class="camera-container shadow-lg d-flex align-items-center justify-content-center">
                <span class="text-white-50"><i class="fas fa-video fa-3x mb-3 d-block text-center"></i> Waiting for Pipeline Stream...</span>
                </div>
        </div>
    </div>
</div>

</body>
</html>
