<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; padding-top: 20px; overflow-y: auto; }
        
        /* Updated Video Container */
        .camera-container { background: #000; border-radius: 8px; position: relative; overflow: hidden; aspect-ratio: 16/9; }
        .camera-feed { width: 100%; height: 100%; object-fit: fill; position: absolute; top: 0; left: 0; }
        
        .bay-card { transition: transform 0.2s; cursor: pointer; border-left: 5px solid #bdc3c7; }
        .bay-card.occupied { border-left-color: #e74c3c; }
        .bay-card.vacant { border-left-color: #2ecc71; }
        .status-badge { font-size: 0.75rem; text-transform: uppercase; }
        .loader-dots { font-size: 0.8rem; color: #3498db; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar shadow">
            <h4 class="text-center mb-4">Parking Bays</h4>
            <div id="bay-list" class="px-2">
                <div class="text-center text-white-50">Loading bays...</div>
            </div>
        </div>

        <div class="col-md-9 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Facility Overview <span class="badge bg-info" style="font-size: 0.5em;">Live Sync</span></h2>
                
                <div class="d-flex">
                    <div class="btn-group" id="camera-buttons">
                        <span class="text-muted mt-2 me-3">Loading cameras...</span>
                    </div>
                    <a href="setup.html" class="btn btn-primary ms-3"><i class="fas fa-cog"></i> Setup Bays</a>
                </div>
            </div>

            <div class="row mb-4 text-center">
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h5 class="text-muted">Total Bays</h5>
                        <h3 id="stat-total">0</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm text-danger">
                        <h5>Occupied</h5>
                        <h3 id="stat-occupied">0</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm text-success">
                        <h5>Available</h5>
                        <h3 id="stat-vacant">0</h3>
                    </div>
                </div>
            </div>

            <div class="camera-container shadow-lg d-flex align-items-center justify-content-center" id="main-video-container">
                <div class="text-center text-white-50" id="video-placeholder">
                    <i class="fas fa-video fa-3x mb-3 d-block"></i>
                    <p>Select a camera to view feed</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://127.0.0.1:8000/api';

    // 1. Fetch cameras and build dynamic buttons
    async function initCameras() {
        try {
            const res = await fetch(`${API_BASE}/cameras`);
            const data = await res.json();
            const btnContainer = document.getElementById('camera-buttons');
            btnContainer.innerHTML = '';

            if (data.cameras.length === 0) {
                btnContainer.innerHTML = '<span class="text-muted mt-2 d-inline-block">No cameras added.</span>';
                return;
            }

            // Create a button for each camera
            data.cameras.forEach((cam, index) => {
                const isActive = index === 0 ? 'active' : '';
                btnContainer.innerHTML += `<button class="btn btn-outline-primary ${isActive}" onclick="switchCamera('${cam.stream_index}', this)">${cam.camera_name}</button>`;
                
                // Auto-load the first camera stream
                if (index === 0) {
                    switchCamera(cam.stream_index, btnContainer.firstChild);
                }
            });
        } catch (e) {
            console.error("Camera Fetch Error:", e);
        }
    }

    // 2. Switch the active video feed
    function switchCamera(streamIndex, btnElement) {
        const container = document.getElementById('main-video-container');
        
        // Remove placeholder and inject the video feed img tag
        container.innerHTML = `<img src="${API_BASE}/video_feed/${streamIndex}" class="camera-feed" alt="Live Stream">`;
        
        // Update button colors (remove active from all, add to clicked)
        document.querySelectorAll('#camera-buttons .btn').forEach(b => b.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');
    }

    // 3. Your existing dashboard sync logic
    async function refreshDashboard() {
        try {
            const response = await fetch(`${API_BASE}/dashboard/status`);
            if (!response.ok) throw new Error("Backend offline");
            
            const data = await response.json();

            // Update Stats Header
            document.getElementById('stat-total').innerText = data.stats.total;
            document.getElementById('stat-occupied').innerText = data.stats.occupied;
            document.getElementById('stat-vacant').innerText = data.stats.vacant;

            // Clear and Rebuild Bay List
            const listContainer = document.getElementById('bay-list');
            listContainer.innerHTML = ''; 

            data.bays.forEach(bay => {
                const isOccupied = bay.current_status === 'occupied';
                const cardClass = isOccupied ? 'occupied' : 'vacant';
                const badgeClass = isOccupied ? 'bg-danger' : 'bg-success';
                
                let vehicleInfo = "No vehicle detected";
                if (isOccupied) {
                    if (bay.make) {
                        vehicleInfo = `<strong>${bay.last_plate_detected}</strong><br>${bay.make} ${bay.vehicle_model} (${bay.model_year})`;
                    } else {
                        vehicleInfo = `<strong>${bay.last_plate_detected}</strong><br><span class="loader-dots">Identifying details...</span>`;
                    }
                }

                listContainer.innerHTML += `
                    <div class="card mb-2 bay-card ${cardClass} shadow-sm">
                        <div class="card-body p-2">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <h6 class="mb-0">${bay.bay_name}</h6>
                                <span class="badge ${badgeClass} status-badge">${bay.current_status}</span>
                            </div>
                            <small class="text-muted" style="line-height: 1.2;">${vehicleInfo}</small>
                        </div>
                    </div>
                `;
            });
        } catch (err) {
            console.error("Sync Error:", err);
            document.getElementById('bay-list').innerHTML = '<div class="alert alert-warning py-1 m-2">Backend Connection Lost...</div>';
        }
    }

    // Start everything up
    initCameras();
    setInterval(refreshDashboard, 2000);
    refreshDashboard();
</script>

</body>
</html>
